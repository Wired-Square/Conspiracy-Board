<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#35855c"/>
      <stop offset="1" stop-color="#0f3623"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e7bd"/>
      <stop offset="1" stop-color="#c39f5f"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffae6"/>
      <stop offset="1" stop-color="#e8c97f"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#e6ffc6" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#a8f0c0" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#a8f0c0" stop-opacity="0"/>
    </radialGradient>

    <!-- One spoke, pointing up from behind the capstone; copied round. -->
    <path id="ray" d="M 512 330 L 488 -90 L 536 -90 Z"/>

    <clipPath id="frame">
      <rect x="48" y="48" width="928" height="928" rx="208" ry="208"/>
    </clipPath>
    <clipPath id="body">
      <path d="M 372 520 L 652 520 L 914 860 L 110 860 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="48" y="48" width="928" height="928" fill="url(#sky)"/>
    <circle cx="512" cy="330" r="430" fill="url(#glow)"/>

    <g fill="#ffeeae" opacity="0.45">
      <use href="#ray"/>
      <use href="#ray" transform="rotate(30 512 330)"/>
      <use href="#ray" transform="rotate(60 512 330)"/>
      <use href="#ray" transform="rotate(90 512 330)"/>
      <use href="#ray" transform="rotate(120 512 330)"/>
      <use href="#ray" transform="rotate(150 512 330)"/>
      <use href="#ray" transform="rotate(180 512 330)"/>
      <use href="#ray" transform="rotate(210 512 330)"/>
      <use href="#ray" transform="rotate(240 512 330)"/>
      <use href="#ray" transform="rotate(270 512 330)"/>
      <use href="#ray" transform="rotate(300 512 330)"/>
      <use href="#ray" transform="rotate(330 512 330)"/>
    </g>

    <!-- Pyramid, truncated: the capstone is a separate stone above it. Filled,
         then coursed, then outlined — so the courses run to the slope and the
         outline stays clean over them. Two courses, not four: at 32px anything
         finer turns to mud. -->
    <path d="M 372 520 L 652 520 L 914 860 L 110 860 Z" fill="url(#stone)"/>
    <g clip-path="url(#body)" stroke="#a07f45" stroke-width="14" opacity="0.5">
      <path d="M 80 640 L 944 640"/>
      <path d="M 80 750 L 944 750"/>
    </g>

    <g stroke="#15271d" stroke-width="22" stroke-linejoin="round" fill="none">
      <path d="M 372 520 L 652 520 L 914 860 L 110 860 Z"/>
      <path d="M 512 170 L 694 460 L 330 460 Z" fill="url(#cap)"/>
    </g>

    <!-- The eye: almond, fat cartoon iris, one bright catchlight. Sized to still
         be an eye at 32px, which is most of why the capstone is this big. -->
    <g stroke="#15271d" stroke-width="20" stroke-linejoin="round">
      <path d="M 412 360 Q 512 278 612 360 Q 512 442 412 360 Z" fill="#fffdf5"/>
      <circle cx="512" cy="360" r="44" fill="#20416b"/>
    </g>
    <circle cx="512" cy="360" r="19" fill="#0d1b2a"/>
    <circle cx="495" cy="343" r="12" fill="#ffffff"/>
  </g>
</svg>
